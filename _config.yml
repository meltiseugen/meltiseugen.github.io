title: Meltis Eugen
description: Personal dashboard, project notes, hobby write-ups, and general articles.
theme: just-the-docs

url: https://meltiseugen.github.io

color_scheme: meltis

search_enabled: true
heading_anchors: true
nav_enabled: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  GitHub:
    - "https://github.com/meltiseugen"
  LinkedIn:
    - "https://www.linkedin.com/in/eugen-ioan-meltis/"
aux_links_new_tab: true

gh_edit_link: false

callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green

exclude:
  - bin/
  - Gemfile
  - Gemfile.lock
  - README.md
  - scaffolds/
  - vendor/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
